<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calming Starfield</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            cursor: none;
        }

        canvas {
            display: block;
        }

        #hint {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.3);
            font-family: 'Georgia', serif;
            font-size: 13px;
            letter-spacing: 2px;
            pointer-events: none;
            transition: opacity 2s ease;
        }
    </style>
</head>

<body>
    <canvas id="c"></canvas>
    <div id="hint">move your cursor gently through the stars</div>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');

        let W = canvas.width = window.innerWidth;
        let H = canvas.height = window.innerHeight;

        const NUM_STARS = 280;
        const NEBULA_COLORS = [
            'rgba(80,40,120,',
            'rgba(20,60,110,',
            'rgba(40,90,80,',
            'rgba(100,30,60,',
        ];

        let mouse = { x: W / 2, y: H / 2 };
        let targetMouse = { x: W / 2, y: H / 2 };

        // Cursor trail
        const trail = [];
        const TRAIL_LEN = 40;

        // Stars
        const stars = Array.from({ length: NUM_STARS }, () => createStar());

        function createStar() {
            return {
                x: Math.random() * W,
                y: Math.random() * H,
                baseX: 0,
                baseY: 0,
                r: Math.random() * 1.6 + 0.2,
                alpha: Math.random() * 0.7 + 0.3,
                twinkleSpeed: Math.random() * 0.015 + 0.003,
                twinklePhase: Math.random() * Math.PI * 2,
                depth: Math.random() * 0.8 + 0.2, // parallax depth 0.2-1.0
                vx: 0,
                vy: 0,
                color: randomStarColor(),
            };
        }

        function randomStarColor() {
            const palette = [
                [255, 255, 255],
                [200, 220, 255],
                [255, 220, 180],
                [180, 200, 255],
                [255, 255, 200],
            ];
            return palette[Math.floor(Math.random() * palette.length)];
        }

        // Shooting stars
        const shootingStars = [];
        function spawnShootingStar() {
            const angle = (Math.random() * 40 + 10) * Math.PI / 180;
            const speed = Math.random() * 5 + 4;
            shootingStars.push({
                x: Math.random() * W * 0.8,
                y: Math.random() * H * 0.4,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                len: Math.random() * 120 + 60,
                alpha: 1,
                width: Math.random() * 1.5 + 0.5,
            });
        }

        // Schedule shooting stars
        let lastShoot = 0;
        function maybeShoot(ts) {
            if (ts - lastShoot > (Math.random() * 4000 + 3000)) {
                spawnShootingStar();
                lastShoot = ts;
            }
        }

        // Nebula blobs (static background)
        const nebulas = Array.from({ length: 5 }, () => ({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 300 + 150,
            color: NEBULA_COLORS[Math.floor(Math.random() * NEBULA_COLORS.length)],
            alpha: Math.random() * 0.12 + 0.04,
        }));

        function drawNebulas() {
            for (const n of nebulas) {
                const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
                g.addColorStop(0, n.color + n.alpha + ')');
                g.addColorStop(1, n.color + '0)');
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawCursorTrail() {
            if (trail.length < 2) return;
            for (let i = 1; i < trail.length; i++) {
                const t = i / trail.length;
                const p = trail[i - 1];
                const q = trail[i];
                ctx.beginPath();
                ctx.strokeStyle = `rgba(180,200,255,${t * 0.35})`;
                ctx.lineWidth = t * 2.5;
                ctx.lineCap = 'round';
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(q.x, q.y);
                ctx.stroke();
            }
            // Glowing dot at cursor
            const last = trail[trail.length - 1];
            const glow = ctx.createRadialGradient(last.x, last.y, 0, last.x, last.y, 18);
            glow.addColorStop(0, 'rgba(200,220,255,0.7)');
            glow.addColorStop(1, 'rgba(200,220,255,0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(last.x, last.y, 18, 0, Math.PI * 2);
            ctx.fill();
        }

        let frame = 0;
        function animate(ts) {
            frame++;
            requestAnimationFrame(animate);

            // Smooth mouse
            mouse.x += (targetMouse.x - mouse.x) * 0.05;
            mouse.y += (targetMouse.y - mouse.y) * 0.05;

            // Trail
            trail.push({ x: mouse.x, y: mouse.y });
            if (trail.length > TRAIL_LEN) trail.shift();

            // Clear
            ctx.fillStyle = 'rgba(2,2,10,0.92)';
            ctx.fillRect(0, 0, W, H);

            drawNebulas();

            // Shooting stars
            maybeShoot(ts);
            for (let i = shootingStars.length - 1; i >= 0; i--) {
                const s = shootingStars[i];
                s.x += s.vx;
                s.y += s.vy;
                s.alpha -= 0.012;
                if (s.alpha <= 0) { shootingStars.splice(i, 1); continue; }

                const tailX = s.x - s.vx * (s.len / (s.vx || 1));
                const tailY = s.y - s.vy * (s.len / (s.vy || 1));
                const g = ctx.createLinearGradient(tailX, tailY, s.x, s.y);
                g.addColorStop(0, `rgba(255,255,255,0)`);
                g.addColorStop(1, `rgba(255,255,255,${s.alpha})`);
                ctx.beginPath();
                ctx.strokeStyle = g;
                ctx.lineWidth = s.width;
                ctx.moveTo(tailX, tailY);
                ctx.lineTo(s.x, s.y);
                ctx.stroke();
            }

            // Stars
            const cx = W / 2;
            const cy = H / 2;
            const dx = (mouse.x - cx) / cx; // -1 to 1
            const dy = (mouse.y - cy) / cy;

            for (const star of stars) {
                // Parallax offset
                const ox = dx * star.depth * 30;
                const oy = dy * star.depth * 30;
                const sx = star.x + ox;
                const sy = star.y + oy;

                // Twinkle
                star.twinklePhase += star.twinkleSpeed;
                const twinkle = 0.5 + 0.5 * Math.sin(star.twinklePhase);
                const alpha = star.alpha * (0.6 + 0.4 * twinkle);

                // Proximity glow near cursor
                const dist = Math.hypot(mouse.x - sx, mouse.y - sy);
                const proximity = Math.max(0, 1 - dist / 120);
                const r = star.r + proximity * 3;
                const [red, green, blue] = star.color;

                if (proximity > 0.01) {
                    const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, r * 6);
                    glow.addColorStop(0, `rgba(${red},${green},${blue},${alpha * proximity * 0.6})`);
                    glow.addColorStop(1, `rgba(${red},${green},${blue},0)`);
                    ctx.fillStyle = glow;
                    ctx.beginPath();
                    ctx.arc(sx, sy, r * 6, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.beginPath();
                ctx.arc(sx, sy, r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${red},${green},${blue},${alpha})`;
                ctx.fill();
            }

            drawCursorTrail();
        }

        window.addEventListener('mousemove', e => {
            targetMouse.x = e.clientX;
            targetMouse.y = e.clientY;
        });

        window.addEventListener('touchmove', e => {
            e.preventDefault();
            targetMouse.x = e.touches[0].clientX;
            targetMouse.y = e.touches[0].clientY;
        }, { passive: false });

        window.addEventListener('resize', () => {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
            for (const s of stars) {
                s.x = Math.random() * W;
                s.y = Math.random() * H;
            }
        });

        // Fade hint
        setTimeout(() => {
            document.getElementById('hint').style.opacity = '0';
        }, 4000);

        requestAnimationFrame(animate);
    </script>
</body>

</html>
